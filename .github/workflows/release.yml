name: Release Obsidian Plugin

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package plugin
        run: |
          cd dist
          zip -r ../stellaris-writing-${{ github.ref_name }}.zip main.js styles.css manifest.json assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: stellaris-writing-${{ github.ref_name }}.zip
          generate_release_notes: true
